<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cash Counter v1</title>
    <style>
        :root { --gold: #ffd700; --bg: #0a0a0a; --card: #1a1a1a; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        h2 { color: var(--gold); margin-bottom: 25px; font-size: 1.5rem; }

        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }

        /* ستايل خانات الفئات */
        .cash-row { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; cursor: pointer; }
        .cash-row:active { transform: scale(0.98); background: #222; }
        
        .label-group { display: flex; align-items: center; gap: 15px; }
        .feya-btn { background: var(--gold); color: #000; font-weight: bold; width: 60px; height: 60px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; border: none; }
        
        .result-group { text-align: left; }
        .count-text { color: #888; font-size: 0.8rem; display: block; }
        .sum-text { color: var(--gold); font-size: 1.2rem; font-weight: bold; font-family: monospace; }

        /* الخانة العريضة للإجمالي الكلي */
        .total-footer { margin-top: 30px; background: linear-gradient(45deg, #1a1a1a, #222); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .total-label { font-size: 1.3rem; font-weight: bold; }
        .total-value { font-size: 1.8rem; color: var(--gold); font-weight: bold; font-family: monospace; }

        /* المودال (النافذة المنبثقة) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 25px; width: 80%; max-width: 300px; border: 1px solid var(--gold); text-align: center; }
        .modal-content h3 { margin-top: 0; color: var(--gold); }
        .modal-content input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; text-align: center; font-size: 1.5rem; outline: none; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .ok-btn { background: var(--gold); color: #000; }
        .cancel-btn { background: #333; color: #fff; }
    </style>
</head>
<body>

    <h2>Cash Counter 💰</h2>

    <div class="container" id="mainContainer">
        </div>

    <div class="total-footer">
        <span class="total-label">الإجمالي الكلي:</span>
        <span id="grandTotal" class="total-value">0</span>
    </div>

    <div id="inputModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">فئة 200</h3>
            <input type="number" id="countInput" placeholder="أدخل العدد" inputmode="numeric">
            <div class="modal-btns">
                <button class="ok-btn" onclick="confirmCount()">OK</button>
                <button class="cancel-btn" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const feyat = [200, 100, 50, 20, 10, 5];
        let cashData = { 200:0, 100:0, 50:0, 20:0, 10:0, 5:0 };
        let activeFeya = null;

        // توليد الواجهة
        const container = document.getElementById('mainContainer');
        feyat.forEach(val => {
            container.innerHTML += `
                <div class="cash-row" onclick="openInput(${val})">
                    <div class="label-group">
                        <div class="feya-btn">${val}</div>
                        <div>
                            <span class="count-text" id="count-${val}">العدد: 0</span>
                        </div>
                    </div>
                    <div class="result-group">
                        <span class="sum-text" id="sum-${val}">0.00</span>
                    </div>
                </div>
            `;
        });

        function openInput(val) {
            activeFeya = val;
            document.getElementById('modalTitle').innerText = `فئة ${val}`;
            document.getElementById('countInput').value = "";
            document.getElementById('inputModal').style.display = 'flex';
            setTimeout(() => document.getElementById('countInput').focus(), 100);
        }

        function closeModal() {
            document.getElementById('inputModal').style.display = 'none';
        }

        function confirmCount() {
            let count = parseInt(document.getElementById('countInput').value) || 0;
            cashData[activeFeya] = count;
            
            // تحديث الواجهة للفئة
            document.getElementById(`count-${activeFeya}`).innerText = `العدد: ${count}`;
            document.getElementById(`sum-${activeFeya}`).innerText = (count * activeFeya).toLocaleString('en-US', {minimumFractionDigits: 2});
            
            updateGrandTotal();
            closeModal();
        }

        function updateGrandTotal() {
            let total = 0;
            feyat.forEach(val => {
                total += (cashData[val] * val);
            });
            document.getElementById('grandTotal').innerText = total.toLocaleString('en-US');
        }

        // إغلاق المودال عند الضغط على Enter
        document.getElementById('countInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') confirmCount();
        });
    </script>
</body>
</html>
