<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cash Counter v2</title>
    <style>
        :root { --gold: #ffd700; --bg: #0a0a0a; --card: #161616; --text: #ffffff; }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; /* يمنع السكرول تماماً */
        }
        
        h2 { color: var(--gold); margin: 10px 0; font-size: 1.2rem; }

        .container { 
            width: 100%; 
            max-width: 380px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; /* مسافة صغيرة بين الخانات */
            flex: 1;
            justify-content: center;
        }

        /* ستايل الخانة المضغوط */
        .cash-row { 
            background: var(--card); 
            border: 1px solid #2a2a2a; 
            border-radius: 12px; 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer;
        }
        
        .label-group { display: flex; align-items: center; gap: 12px; }
        .feya-btn { 
            background: var(--gold); 
            color: #000; 
            font-weight: bold; 
            width: 45px; 
            height: 45px; 
            border-radius: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 1.1rem; 
        }
        
        .count-text { color: #888; font-size: 0.75rem; }
        .sum-text { color: var(--gold); font-size: 1.1rem; font-weight: bold; font-family: monospace; }

        /* الإجمالي الكلي */
        .total-footer { 
            margin-top: 15px; 
            background: linear-gradient(45deg, #1a1a1a, #222); 
            border: 1px solid var(--gold); 
            border-radius: 15px; 
            padding: 15px; 
            width: 100%; 
            max-width: 380px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 10px;
        }
        .total-label { font-size: 1.1rem; font-weight: bold; }
        .total-value { font-size: 1.5rem; color: var(--gold); font-weight: bold; font-family: monospace; }

        /* المودال */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 20px; width: 85%; max-width: 280px; border: 1px solid var(--gold); }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 1.4rem; }
        .modal-btns { display: flex; gap: 8px; }
        .modal-btns button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; }
        .ok-btn { background: var(--gold); color: #000; }
        .cancel-btn { background: #333; color: #fff; }
    </style>
</head>
<body>

    <h2>Cash Counter 💰</h2>

    <div class="container" id="mainContainer"></div>

    <div class="total-footer">
        <span class="total-label">الإجمالي:</span>
        <span id="grandTotal" class="total-value">0</span>
    </div>
