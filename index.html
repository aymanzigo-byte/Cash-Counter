<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="manifest.json">
    <title>تجميع فئات مصرية</title>
    <style>
        :root { --gold: #ffd700; --bg: #0a0a0a; --card: #161616; --text: #ffffff; --danger: #ff4b2b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: system-ui, -apple-system, sans-serif; 
            padding: 10px; display: flex; flex-direction: column; 
            align-items: center; height: 100vh; overflow: hidden; user-select: none;
        }
        
        header { width: 100%; max-width: 380px; display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #222; margin-bottom: 5px; }
        h2 { color: var(--gold); font-size: 1.1rem; letter-spacing: 1px; }
        .settings-btn { background: none; border: none; color: var(--gold); font-size: 1.5rem; cursor: pointer; padding: 5px; }

        .container { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 4px; flex: 1; justify-content: center; }
        
        .cash-row { 
            background: var(--card); border: 1px solid #2a2a2a; border-radius: 10px; 
            padding: 8px 12px; display: flex; justify-content: space-between; 
            align-items: center; cursor: pointer;
        }
        .cash-row:active { background: #222; transform: scale(0.98); }
        .label-group { display: flex; align-items: center; gap: 10px; }
        .feya-btn { 
            background: var(--gold); color: #000; font-weight: bold; width: 38px; height: 38px; 
            border-radius: 8px; display: flex; justify-content: center; align-items: center; 
            font-size: 0.9rem;
        }
        .count-text { color: #888; font-size: 0.7rem; }
        .sum-text { color: var(--gold); font-size: 1rem; font-weight: bold; font-family: monospace; }
        
        .clear-btn {
            background: none; border: 1px solid var(--danger); color: var(--danger);
            padding: 6px 20px; border-radius: 8px; cursor: pointer;
            margin: 8px 0; font-weight: bold; font-size: 0.8rem; transition: 0.2s;
        }
        .clear-btn:active { background: var(--danger); color: #fff; }

        .total-footer { 
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); 
            border: 1px solid var(--gold); border-radius: 12px; padding: 15px; 
            width: 100%; max-width: 380px; display: flex; justify-content: space-between; 
            align-items: center; margin-bottom: 5px;
        }
        .total-value { font-size: 1.4rem; color: var(--gold); font-weight: bold; font-family: monospace; }

        /* المودال */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 20px; width: 85%; max-width: 300px; border: 1px solid #333; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; background: #000; color: #fff; text-align: center; font-size: 1.8rem; border: 1px solid #444; outline: none; }
        
        #historyMenu { display: none; flex-direction: column; align-items: center; width: 100%; }
        .history-list { width: 100%; max-height: 250px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #333; }
        .history-item { padding: 10px 5px; border-bottom: 1px solid #222; font-size: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <header>
        <div style="width:30px"></div>
        <h2>تجميع فئات مصرية</h2>
        <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    </header>

    <div class="container" id="mainContainer"></div>

    <button class="clear-btn" onclick="clearAll()">تصفير الخانات (Clear)</button>

    <div class="total-footer">
        <span style="font-weight:bold">الإجمالي الكلي</span>
        <span id="grandTotal" class="total-value">0</span>
    </div>

    <div id="inputModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="color:var(--gold)"></h3>
            <input type="number" id="countInput" placeholder="0" inputmode="numeric">
            <div style="display:flex; gap:10px">
                <button onclick="confirmCount()" style="flex:1; padding:12px; background:var(--gold); border:none; border-radius:10px; font-weight:bold; color:#000">حفظ</button>
                <button onclick="closeModal()" style="flex:1; padding:12px; background:#333; border:none; border-radius:10px; color:#fff">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content" style="max-width:350px; width:90%">
            <h3 style="color:var(--gold); margin-bottom:15px">القائمة الرئيسية
